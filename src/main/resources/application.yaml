server:
  port: 3000

app:
  api:
    base-package: net.mkubik.gmms.web.v1

spring:
  devtools:
    restart:
      enabled: true

  application:
    name: gmms

  datasource:
    url: jdbc:h2:mem:gmmsdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
    hikari:
      auto-commit: false
      transaction-isolation: TRANSACTION_READ_COMMITTED
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: gmms-pool

  h2:
    console:
      enabled: true
      path: /h2console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  transaction:
    default-timeout: 8

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.zaxxer.hikari: INFO
